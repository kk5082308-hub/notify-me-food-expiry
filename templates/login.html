{% extends 'base.html' %}

{% block title %}Login - Notify-Me{% endblock %}

{% block content %}
<div class="container fade-in">
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
      <div class="card glass-card p-4 my-5">
        <div class="text-center mb-4">
          <h2 class="font-heading fw-bold">Welcome Back</h2>
          <p class="text-secondary">Login to manage your packaged food items</p>
        </div>
        
        <form method="POST" action="/login">
          <!-- Email Input -->
          <div class="mb-3">
            <label for="email" class="form-label">Email Address</label>
            <div class="input-group">
              <span class="input-group-text bg-transparent border-end-0"><i class="bi bi-envelope"></i></span>
              <input type="email" class="form-control border-start-0" id="email" name="email" required placeholder="name@example.com">
            </div>
          </div>
          
          <!-- Password Input -->
          <div class="mb-4">
            <label for="password" class="form-label">Password</label>
            <div class="input-group">
              <span class="input-group-text bg-transparent border-end-0"><i class="bi bi-lock"></i></span>
              <input type="password" class="form-control border-start-0" id="password" name="password" required placeholder="••••••••">
            </div>
          </div>
          
          <!-- Remember me checkbox -->
          <div class="mb-4 d-flex justify-content-between align-items-center">
            <div class="form-check">
              <input type="checkbox" class="form-check-input" id="remember" name="remember">
              <label class="form-check-label text-secondary" for="remember">Remember me</label>
            </div>
          </div>
          
          <!-- Submit Button -->
          <div class="d-grid mb-3">
            <button type="submit" class="btn btn-premium btn-lg">Login</button>
          </div>
        </form>
        
        <div class="text-center mt-3">
          <p class="text-secondary mb-0">Don't have an account? <a href="/register" class="text-success fw-bold">Register here</a></p>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
